name: Generate Daily Digest

on:
  schedule:
    - cron: '30 11 * * *'  # 11:30 UTC daily
  workflow_dispatch:
    inputs:
      date:
        description: 'Digest date (YYYY-MM-DD, default: today)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate digest
        working-directory: src
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          ARGS="--html"
          if [ -n "$DATE" ]; then
            ARGS="$ARGS --date $DATE"
          fi
          DATESTAMP="${DATE:-$(date +%Y%m%d)}"
          python -m cli $ARGS > "AI-News-${DATESTAMP}.html" 2>/dev/null

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/AI-News-*.html
          git diff --cached --quiet || git commit -m "chore: generate daily digest $(date +%Y-%m-%d)"
          git push
